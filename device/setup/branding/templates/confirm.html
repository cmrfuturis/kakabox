<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kakabox · WLAN verbinden</title>
    <link rel="icon" href="img/favicon.ico">
    <style>
        @font-face {
            font-family: 'Fredoka';
            src: url('css/Fredoka.woff2') format('woff2-variations'),
                 url('css/Fredoka.woff2') format('woff2');
            font-weight: 300 700;
            font-style: normal;
            font-display: swap;
        }
        :root {
            --bg-solid: #f5f3ff;
            --surface: #ffffff;
            --ink: #1e1b4b;
            --ink-2: #475569;
            --line: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #a78bfa;
            --radius-sm: 12px;
            --radius: 20px;
            --grad-sunset: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --grad-soft: linear-gradient(180deg, #f5f3ff 0%, #e0e7ff 100%);
            --shadow-sm: 0 2px 12px rgba(30, 27, 75, 0.06);
            --shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
            --shadow-lg: 0 24px 60px rgba(139, 92, 246, 0.22);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--grad-soft);
            color: var(--ink);
            font-family: 'Fredoka', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
        .stack { width: 100%; max-width: 460px; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 28px 24px;
        }
        .pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--ink-2);
            font-size: 0.82rem; font-weight: 500;
            box-shadow: var(--shadow-sm);
        }
        .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); }
        .head { text-align: center; margin-bottom: 22px; }
        h1 { font-size: 1.6rem; font-weight: 700; margin: 14px 0 6px; color: var(--ink); letter-spacing: -0.01em; word-break: break-word; }
        .lead { color: var(--ink-2); font-size: 0.95rem; margin: 0; }
        .input {
            width: 100%; padding: 12px 18px;
            border: 1.5px solid var(--line); border-radius: 999px;
            font: inherit; color: var(--ink); background: var(--surface);
            outline: none; transition: border-color 0.15s ease;
        }
        .input:focus { border-color: var(--primary); }
        .field { margin: 18px 0 16px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            padding: 12px 22px; border-radius: 999px;
            font: inherit; font-weight: 600; font-size: 0.95rem;
            border: 0; cursor: pointer; text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.2s ease;
            white-space: nowrap;
        }
        .btn-primary { background: var(--grad-sunset); color: #fff; box-shadow: var(--shadow); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }
        .btn-ghost { background: transparent; color: var(--ink); border: 1.5px solid var(--line); }
        .btn-ghost:hover { border-color: var(--primary); }
        .info { font-size: 0.9rem; color: var(--ink-2); margin: 16px 0; padding: 12px 14px; background: var(--bg-solid); border-radius: var(--radius-sm); }
    </style>
</head>
<body>
<div class="wrap">
    <div class="stack">
        <div class="card">
            <div class="head">
                <span class="pill"><span class="dot"></span> WLAN-Passwort</span>
                <h1>{{ ssid }}</h1>
                <p class="lead">Gib das Passwort für dieses Netz ein.</p>
            </div>

            <form method="POST" action="/connect">
                <input type="hidden" name="ssid" value="{{ ssid }}">
                {% if encrypted == 'encrypted' %}
                <div class="field">
                    <input class="input" type="password" name="password" placeholder="Passwort"
                           autofocus required minlength="8" maxlength="63">
                </div>
                {% else %}
                <div class="info">Das Netz ist offen — keine Passworteingabe nötig.</div>
                {% endif %}

                <div class="grid-2">
                    <a href="/" class="btn btn-ghost">Zurück</a>
                    <button class="btn btn-primary" type="submit">Verbinden</button>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
