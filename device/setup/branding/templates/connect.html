<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="refresh" content="20">
    <title>Kakabox · Verbinde …</title>
    <link rel="icon" href="img/favicon.ico">
    <style>
        @font-face {
            font-family: 'Fredoka';
            src: url('css/Fredoka.woff2') format('woff2-variations'),
                 url('css/Fredoka.woff2') format('woff2');
            font-weight: 300 700;
            font-style: normal;
            font-display: swap;
        }
        :root {
            --bg-solid: #f5f3ff;
            --surface: #ffffff;
            --ink: #1e1b4b;
            --ink-2: #475569;
            --line: #e2e8f0;
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #8b5cf6;
            --accent: #a78bfa;
            --radius-sm: 12px;
            --radius: 20px;
            --grad-sunset: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --grad-soft: linear-gradient(180deg, #f5f3ff 0%, #e0e7ff 100%);
            --shadow-sm: 0 2px 12px rgba(30, 27, 75, 0.06);
            --shadow: 0 12px 40px rgba(99, 102, 241, 0.15);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; height: 100%; }
        body {
            background: var(--grad-soft);
            color: var(--ink);
            font-family: 'Fredoka', system-ui, -apple-system, 'Segoe UI', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px 16px; }
        .stack { width: 100%; max-width: 460px; }
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 32px 24px;
            text-align: center;
        }
        .pill {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 14px; border-radius: 999px;
            background: var(--surface);
            border: 1px solid var(--line);
            color: var(--ink-2);
            font-size: 0.82rem; font-weight: 500;
            box-shadow: var(--shadow-sm);
        }
        .pill .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: pulse 1.4s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        h1 { font-size: 1.5rem; font-weight: 700; margin: 18px 0 6px; color: var(--ink); letter-spacing: -0.01em; word-break: break-word; }
        .accent { background: var(--grad-sunset); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .lead { color: var(--ink-2); font-size: 0.95rem; margin: 0; }
        .spinner {
            display: inline-block; width: 44px; height: 44px;
            border: 4px solid rgba(99, 102, 241, 0.18);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 22px 0 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .meta { font-size: 0.78rem; color: var(--ink-2); margin-top: 14px; opacity: 0.8; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="stack">
        <div class="card">
            <span class="pill"><span class="dot"></span> Verbinde …</span>
            <h1>Mit <span class="accent">„{{ ssid }}"</span></h1>
            <div class="spinner"></div>
            <p class="lead">Das kann bis zu einer Minute dauern. Sobald die Verbindung steht, schaltet sich dieser Hotspot ab — dein Gerät verbindet sich automatisch wieder mit deinem normalen WLAN.</p>
            <p class="meta">Diese Seite aktualisiert sich alle 20 Sekunden.</p>
        </div>
    </div>
</div>
</body>
</html>
