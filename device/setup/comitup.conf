# Kakabox-spezifische comitup-Konfiguration.
#
# Wird vom install-wifi-onboarding.sh nach /etc/comitup.conf kopiert.

# Hotspot-SSID. <nnnn> wird durch eine vier-stellige instanz-eindeutige
# Zahl ersetzt, damit mehrere Kakaboxen im selben Haushalt unterscheidbar sind.
ap_name: Kakabox-<nnnn>

# Offener Hotspot. Passwort würde zwar etwas Sicherheit bringen, aber wir
# müssten es dem Nutzer mitteilen — das mindert UX. Tonibox/Sonos machen's
# auch offen. Das WLAN-Passwort des Heim-Netzes geht zwar darüber unverschlüsselt,
# aber nur für eine sehr kurze Zeitspanne in unmittelbarer Reichweite.
# ap_password:

# Service-Name für mDNS — im Heim-Netz später als kakabox.local erreichbar.
service_name: kakabox

# State-Callback. Wird beim Wechsel HOTSPOT → CONNECTING → CONNECTED aufgerufen.
external_callback: /usr/local/bin/kakabox-comitup-callback

# Wir nutzen unsere eigene Reset-Logik via roter Knopf (GPIO25, 10s halten),
# nicht comitup's Hardware-Pin-Nuke.
enable_nuke: 0

# IPv6-Link-Local sicherer Default für IoT-Geräte
ipv6_link_local: 1

# Ein Wifi-Adapter (wlan0) — kein Appliance-Modus
enable_appliance_mode: False

primary_wifi_device: wlan0

# Logfile-Verbosity (0 = info, 1 = debug)
verbose: 0
