# NetworkManager-Drop-in: WLAN-Power-Save abschalten.
#
# Warum: Der Pi-WLAN-Treiber legt bei Idle das Funkmodul in Power-Save.
# Bei mittlerem Signal (~-65 dBm und schlechter) verpasst er dann Beacons,
# die Verbindung gilt als down, NetworkManager räumt sie ab und comitup
# wechselt in den Hotspot-Modus ("Kakabox-XXXX"). Nach ein paar Minuten
# verbindet sich der Pi neu — daher das "WLAN geht ab und zu aus"-Verhalten.
#
# wifi.powersave = 2  → disable. (0=default, 1=ignore, 2=disable, 3=enable)
#
# Wirkt global für alle WLAN-Profile (auch das, das comitup nach dem
# Onboarding anlegt).
[connection]
wifi.powersave = 2
